# ===== DATABASE =====
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.sslmode=require

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== SERVER =====
server.port=${PORT:8080c}
spring.application.name=rhythmix-backend

# ===== JWT =====
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===== APP =====
frontend.url=${FRONTEND_URL}

google.client.id=${GOOGLE_CLIENT_ID}
gmail.client.id=${GOOGLE_CLIENT_ID}
gmail.client.secret=${GOOGLE_CLIENT_SECRET}
gmail.refresh.token=${GMAIL_REFRESH_TOKEN}
gmail.from.email=${GMAIL_FROM_EMAIL}

app.base.url=${FRONTEND_URL}