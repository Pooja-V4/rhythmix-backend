services:
  - type: web
    name: rhythmix-backend
    env: java
    region: singapore
    plan: free
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/musicapp-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false